image:
  repository: regretio/pilot
  tag: latest
  pullPolicy: IfNotPresent

storage:
  size: 20Gi
  storageClass: ""

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Basic auth password for write operations. Empty = auth disabled.
authPassword: ""

# Namespace where adapter pods will be deployed
adapterNamespace: ""  # defaults to release namespace

# Pilot gRPC address for adapter registration (auto-configured)
pilotGrpcAddr: ""

# Studio (Next.js UI)
studio:
  image:
    repository: regretio/studio
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 3000
    nodePort: 30080
