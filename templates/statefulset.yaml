apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "regret.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "regret.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "regret.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "regret.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "regret.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "regret.fullname" . }}
      containers:
        - name: regret-pilot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: DATA_DIR
              value: /data
            - name: ROCKSDB_PATH
              value: /data/rocksdb
            - name: DATABASE_URL
              value: sqlite:///data/regret.db
            - name: HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: NAMESPACE
              value: {{ include "regret.adapterNamespace" . }}
            {{- if .Values.authPassword }}
            - name: AUTH_PASSWORD
              value: {{ .Values.authPassword | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.storageClass }}
        storageClassName: {{ .Values.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
